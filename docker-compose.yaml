version: '3.9'

services:
  db:
    image: postgres:15
    container_name: finance-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: finance-dashboard-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '5000:5000'
    env_file:
      - .env
    command: sh -c "pnpm db:generate && pnpm dev"

volumes:
  postgres_data:
